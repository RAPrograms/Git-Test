name: Github Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  Deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch repositories details
        run: |
          echo $(gh api repos/${{ github.repository_owner }}/Hangman/readme --jq '.content' | base64 --decode)
        env:
          GH_TOKEN: ${{ github.token }}