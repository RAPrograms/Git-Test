name: Github Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  Deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Cache Node dependencies
        uses: actions/cache@v3 
        with:
          path: data
          key: hi

      - name: Dir Create
        run: mkdir -p data

      - name: Create Files
        run: echo "" > ./data/$(($(ls | wc -l)+1)).txt

      - name: output
        run: ls ./data
      
      
