name: Github Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  Deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch repositories details
        run: |
          gh repo list ${{ github.repository_owner }} --limit 1000 --source --public --json description,homepageUrl,id,languages,description,repositoryTopics,name,primaryLanguage,repositoryTopics,url > ./db/repos.json
        env:
          GH_TOKEN: ${{ github.token }}

      # Step 1: Restore the image cache if it exists
      - name: Cache Readme Images
        id: image-cache
        uses: actions/cache@v4
        with:
          path: ./db/image_cache.json
          # Using a static key so it always fetches the latest saved cache from previous runs
          key: readme-images-cache-${{ github.run_id }}
          restore-keys: |
            readme-images-cache-

      # Steps 2-5: Process repos, check cache, extract images, and update
      - name: Extract and Cache Readme Images
        run: |
          # Initialize an empty JSON cache file if it doesn't exist
          if [ ! -f ./db/image_cache.json ]; then
            echo "{}" > ./db/image_cache.json
          fi

          # Loop through each repo name using jq
          jq -r '.[] | .name' ./db/repos.json | while read -r repo_name; do
            
            # Check if the repo already has a cached image URL (and it's not null)
            cached_url=$(jq -r --arg repo "$repo_name" '.[$repo]' ./db/image_cache.json)
            
            if [ "$cached_url" != "null" ] && [ -n "$cached_url" ]; then
              echo "Skipping $repo_name: Image already cached -> $cached_url"
              continue
            fi

            echo "Processing $repo_name: Fetching README..."

            # Fetch the README content via GitHub CLI (handles standard variations like README.md, readme.md, etc.)
            # We use '|| true' so the script doesn't crash if a repo has no README
            readme_content=$(gh repo view "${{ github.repository_owner }}/$repo_name" --json readme --template '{{.readme.body}}' 2>/dev/null || true)

            if [ -z "$readme_content" ]; then
              echo "No README found for $repo_name"
              # Cache a blank/null string so we don't keep checking empty repos next time
              jq --arg repo "$repo_name" '.[$repo] = ""' ./db/image_cache.json > ./db/image_cache.tmp && mv ./db/image_cache.tmp ./db/image_cache.json
              continue
            fi

            # Regex to find the first image URL (matches standard Markdown ![alt](url) and HTML <img src="url">)
            # 1. Looks for Markdown: !\[.*?\]\((https?:\/\/.*?)\)
            # 2. Looks for HTML: <img .*?src=["'](https?:\/\/.*?)["']
            image_url=$(echo "$readme_content" | grep -oE '!\[.*\]\((https?://[^)]+)\)|<img [^>]*src=["'\''](https?://[^"'\'']+)["'\'']' | head -n 1 | sed -E 's/.*!\[.*\]\(([^)]+)\).*/\1/; s/.*src=["'\'']([^"'\'']+).*/\1/')

            if [ -n "$image_url" ]; then
              echo "Found image for $repo_name: $image_url"
              # Update the JSON cache file
              jq --arg repo "$repo_name" --arg url "$image_url" '.[$repo] = $url' ./db/image_cache.json > ./db/image_cache.tmp && mv ./db/image_cache.tmp ./db/image_cache.json
            else
              echo "No image found in README for $repo_name"
              jq --arg repo "$repo_name" '.[$repo] = ""' ./db/image_cache.json > ./db/image_cache.tmp && mv ./db/image_cache.tmp ./db/image_cache.json
            fi

          done
        env:
          GH_TOKEN: ${{ github.token }}